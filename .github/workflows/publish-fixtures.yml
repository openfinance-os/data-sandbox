name: Publish fixtures

# Publishes @openfinance-os/sandbox-fixtures (npm) and
# openfinance-os-sandbox-fixtures (PyPI) when a tag matching
# fixtures-v* is pushed.
#
# Tokens required (set in repo Settings → Secrets):
#   NPM_TOKEN  — npm publish token with publish access to the
#                @openfinance-os scope
#   PYPI_TOKEN — PyPI API token scoped to the project (or a project-
#                specific Trusted Publisher OIDC config — preferred)

on:
  push:
    tags: ['fixtures-v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build:fixtures
      - name: Publish to npm
        working-directory: packages/sandbox-fixtures
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npm run build:fixtures
      - name: Build wheel + sdist
        working-directory: packages/sandbox-fixtures-py
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sandbox-fixtures-py/dist/
