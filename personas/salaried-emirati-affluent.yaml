narrative: |
  Khalid is a 45-year-old Emirati national in Abu Dhabi, salaried at AED
  60k/mo, with a mortgage, a savings account, a high-limit credit card,
  and several monthly commitments (school fees, club membership, utilities).
  Tests multi-account stress, high-DBR commitments, and a Sharia-compliant
  mortgage product. Salary lands on the 27th, mortgage principal hits the
  next day.
