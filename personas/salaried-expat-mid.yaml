persona_id: salaried_expat_mid
domain: banking
name: "Sara — Salaried Expat (Mid Tier)"
archetype: salaried_expat
default_seed: 4729
stress_coverage:
  - salary_payroll_flag
  - credit_line_block

demographics:
  nationality_pool: expat_indian
  age_band: 28-38
  emirate: dubai

income:
  primary_employer_pool: tech_freezone
  monthly_amount_aed: 25000
  pay_day: 25
  variability: low
  flag_payroll: true

accounts:
  - type: CurrentAccount
    currency: AED
    age_months: 24
  - type: CreditCard
    currency: AED
    credit_limit_aed: 50000
    age_months: 18

fixed_commitments:
  - kind: standing_order
    purpose: rent
    amount_aed: 8000
    schedule: monthly_27
  - kind: direct_debit
    purpose: utilities_dewa
    amount_aed_band: [400, 800]
    schedule: monthly_5
  - kind: direct_debit
    purpose: telco
    amount_aed_band: [200, 350]
    schedule: monthly_8

spend_profile:
  groceries_aed_per_month_band: [1200, 2200]
  fuel_aed_per_month_band: [400, 700]
  dining_per_month_count_band: [4, 12]

fx_activity: false
cash_deposit_activity: false

distress_signals:
  nsf_events_per_year_band: [0, 1]

narrative: |
  Sara is an IT professional in Dubai, salaried at AED 25k/mo from a tech-sector
  free-zone employer. She has a current account she has held for 2 years and one
  credit card. Her rent direct debit hits two days after her 25th-of-the-month
  salary; utilities and telco are predictable mid-month direct debits. No FX, no
  cash deposits — a classic "baseline affordability case" persona that exercises
  the spec-clean Flags=Payroll salary marker and the optional CreditLine block.
