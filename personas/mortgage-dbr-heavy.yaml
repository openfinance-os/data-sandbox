  - mortgage_long_dated

demographics:
  nationality_pool: expat_arab
  age_band: 38-48
  emirate: dubai

income:
  primary_employer_pool: tech_freezone
  monthly_amount_aed: 32000
  pay_day: 25
  variability: low
  flag_payroll: true

accounts:
