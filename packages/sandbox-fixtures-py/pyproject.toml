[project]
name = "openfinance-os-sandbox-fixtures"
version = "1.0.0"
description = "Deterministic, v2.1-shaped UAE Open Finance synthetic fixtures from the Open Finance Data Sandbox. Python wrapper around @openfinance-os/sandbox-fixtures (npm)."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "OpenFinance-OS Commons" }]
keywords = ["open-finance", "uae", "synthetic-data", "fixtures", "v2-1", "tpp", "commons"]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: Financial and Insurance Industry",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Office/Business :: Financial",
]

[project.urls]
Homepage = "https://github.com/openfinance-os/data-sandbox"
Repository = "https://github.com/openfinance-os/data-sandbox"
Issues = "https://github.com/openfinance-os/data-sandbox/issues"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"openfinance_os_sandbox_fixtures" = ["data/**/*"]
